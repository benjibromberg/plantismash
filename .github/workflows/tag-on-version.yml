name: Tag on version (single source)

on:
  push:
    branches:
      - master
      - release/*

jobs:
  tag-from-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Extract version from antismash/__init__.py
        id: getver
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(sed -nE "s/^__version__\s*=\s*['\"]([^'\"]+)['\"]/\\1/p" antismash/__init__.py)
          [ -n "${VERSION:-}" ] || { echo "No __version__ found"; exit 1; }
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify release/* branch suffix matches version (if applicable)
        if: startsWith(github.ref_name, 'release/')
        run: |
          set -euo pipefail
          EXPECTED="${GITHUB_REF_NAME#release/}"
          test "${EXPECTED}" = "${{ steps.getver.outputs.version }}" || {
            echo "Version mismatch: branch expects ${EXPECTED}, file has ${{ steps.getver.outputs.version }}"
            exit 1
          }

      - name: Create tag or fail if stale
        shell: bash
        run: |
          set -euo pipefail
          TAG="plantismash-${{ steps.getver.outputs.version }}"
          HEAD_SHA=$(git rev-parse HEAD)
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            TAG_SHA=$(git rev-list -n1 "${TAG}")
            if [ "${TAG_SHA}" != "${HEAD_SHA}" ]; then
              echo "Tag ${TAG} already exists but points to ${TAG_SHA}, not HEAD ${HEAD_SHA}."
              echo "Bump __version__ (e.g. 2.0.3.1) or delete/retag manually."
              exit 1
            fi
            echo "Tag ${TAG} already exists and points to HEAD; nothing to do."
            exit 0
          fi
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git tag -a "${TAG}" -m "plantiSMASH ${TAG#plantismash-}"
          git push origin "${TAG}"