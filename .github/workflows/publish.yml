name: Build & Publish to (Test)PyPI on Release

on:
  release:
    types: [published]   # fires when you publish a GitHub Release via the UI
  workflow_dispatch:     # allow manual runs

permissions:
  contents: read
  id-token: write        # needed for PyPI Trusted Publishing (OIDC). Safe even if you use tokens.

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # if you ever switch back to setuptools-scm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Any modern version is fine for building; runtime pins live in requires-python
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check artifacts
        run: python -m twine check dist/*

      - name: Upload build artifacts to the Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz

      # ===== OPTION A: Trusted Publishing (recommended) =====
      # Requires you to enable Trusted Publishing on PyPI for the 'plantismash' project,
      # linking this GitHub repo. No secrets needed.
      - name: Publish to TestPyPI if this is a prerelease (Trusted Publishing)
        if: github.event.release.prerelease == true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - name: Publish to PyPI if this is a normal (non-prerelease) release (Trusted Publishing)
        if: github.event.release.prerelease == false
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      # ===== OPTION B: Classic API token (uncomment if you prefer tokens) =====
      # - name: Publish to TestPyPI (token)
      #   if: github.event.release.prerelease == true
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     repository-url: https://test.pypi.org/legacy/
      #     user: __token__
      #     password: ${{ secrets.TEST_PYPI_API_TOKEN }}
      #     skip-existing: true
      #
      # - name: Publish to PyPI (token)
      #   if: github.event.release.prerelease == false
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     user: __token__
      #     password: ${{ secrets.PYPI_API_TOKEN }}
      #     skip-existing: true