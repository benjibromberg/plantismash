name: Build & Publish to (Test)PyPI on Release

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: write      # needed for attaching assets to the GitHub Release
  id-token: write      # needed for PyPI Trusted Publishing (main PyPI only)

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Twine check artifacts
        run: python -m twine check dist/*

      - name: Upload build artifacts to Actions (for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/*.whl
            dist/*.tar.gz

      # ---------- Attach to GitHub Release (uses PAT to bypass org token limits) ----------
      - name: Upload artifacts to the GitHub Release (by release_id, PAT)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN }}          # fine-grained PAT with Contents: RW
          release_id: ${{ github.event.release.id }}   # numeric id from the event
          files: |
            dist/*.whl
            dist/*.tar.gz
          overwrite: true
          fail_on_unmatched_files: true

      # ---------- Publish to TestPyPI for pre-releases (token auth) ----------
      - name: Publish to TestPyPI (pre-release)
        if: github.event_name == 'release' && github.event.release.prerelease == true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          skip-existing: true

      # ---------- Publish to PyPI for normal releases (Trusted Publishing via OIDC) ----------
      - name: Publish to PyPI (normal release)
        if: github.event_name == 'release' && github.event.release.prerelease == false
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true