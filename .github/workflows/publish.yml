name: Build & Publish to (Test)PyPI on Release

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: write      # needed to update the Release (attach assets)
  id-token: write      # needed for PyPI Trusted Publishing

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Derive tag/prerelease flags in a single place
      - name: Compute release metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ github.event.release.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            # Manual runs: fall back to the ref name (or let user pass an input)
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Computed tag: $(grep '^tag=' $GITHUB_OUTPUT | cut -d= -f2)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check artifacts
        run: python -m twine check dist/*

      - name: Upload artifacts to the GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}                  # explicit token
          tag_name: ${{ steps.meta.outputs.tag }}             # raw tag, not refs/tags/...
          files: |
            dist/*.whl
            dist/*.tar.gz
          fail_on_unmatched_files: true
          # allowUpdates: true   # uncomment if you want to overwrite on re-runs

      # ===== Trusted Publishing to (Test)PyPI =====
      - name: Publish to TestPyPI (prerelease)
        if: steps.meta.outputs.prerelease == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - name: Publish to PyPI (normal release)
        if: steps.meta.outputs.prerelease == 'false' && github.event_name == 'release'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true